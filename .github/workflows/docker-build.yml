name: Build and Push Docker Image

# This tells GitHub to run this script every time you push code to the 'main' branch.
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step A: Grab your files from the repository
      - name: Check out the repo
        uses: actions/checkout@v4

      # Step B: Log in to Docker Hub using the secrets we just set up
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step C: Set up Docker Buildx (the tool that actually builds the image)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step D: Build the image and push it to your Docker Hub account
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Replace 'yourusername' with your actual Docker Hub username!
          tags: yourusername/ucolorpi-app:latest